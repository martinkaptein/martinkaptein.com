{{ partial "header.html" . }}

<section id=content>
    <!--List of posts-->
    <ul class=posts_listing>
	{{ range .Paginator.Pages }}
        <div id="posts">
          <div id="date" class="date-time-title">
              <time datetime='{{ .Date.Format "2006-01-02" }}'>{{ .Date.Format "2006-01-02" }}</time>
          </div>
          <div class="date-time-title post">
            <a href="{{ .Permalink }}">{{ .Title }}</a>
          </div>
        </div>
      {{ end }}
    </ul>
    <!--Pagination menu-->
    <ul class=menu_listing>
	    {{ with .Paginator.Prev }}
	    <div id="menu_pag">
		    <div class="menu_item">
			    <a href="{{ .URL }}"><<</a>
		    </div>
	    </div>
	    {{ end }}
	    {{ with .Paginator.Next }}
	    <div id="menu_pag">
		    <div class="menu_item">
			    <a href="{{ .URL }}">>></a>
		    </div>
	    </div>
	    {{ end }}
    </ul>
  </section>

{{ partial "footer.html" . }}
