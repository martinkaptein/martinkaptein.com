{{ partial "header.html" . }}

<section id=content>
    <!-- Language menu -->
    <ul class=language_listing>
	    {{ range $.Site.Home.AllTranslations }}
	    <div id="language">
		    <div class="language_item">
			    <a href="{{ .Permalink }}">{{ .Language.LanguageName }}</a>
		    </div>
	    </div>
	    {{ end }}
    </ul>
	<!--Menu-->
    <ul class=menu_listing>
	    {{ range .Site.Menus.main }}
	    <div id="menu">
		    <div class="menu_item">
			    <a href="{{ .URL }}">{{ .Title }}</a>
		    </div>
	    </div>
	    {{ end }}
    </ul>
  </section>

{{ partial "footer.html" . }}
